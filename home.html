    <link rel="stylesheet" href="main.css">
    <style>
            .Logo-txt {
                font-size: 1.75rem; 
                font-weight: bold;
                background: linear-gradient(to right, #3DE5B1, #42B1F6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent; 
                background-clip: text;
                text-fill-color: transparent;
            }

            .active{
                border: 1px solid #42B8EA !important;
                background-color: #42B8EA !important;
            }

            .nav-link i {
                color: #42B8EA !important;
            }

            .nav-link.active i {
                color: #ffffff !important;
            }

            .nav-link.active {
                border: 1px solid #42B8EA !important;
                background-color: #42B8EA !important;
            }

            .navbar-brand{
                    display: flex;
            }

            @media (max-width: 299px){
                .navbar-brand{
                    display: none;
                }
            }

            @media (max-width: 600px){
                .Logo-txt{
                    display: none;
                }
                .Profile-name{
                    display: none;
                }
            }

                                </li>

                              <form method="POST">
